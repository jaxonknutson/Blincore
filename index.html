<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Blincore</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #0d0d1a; color: #e0e0ff;
      font-family: -apple-system, 'Segoe UI', sans-serif; overflow: hidden; }

    /* ── Setup screen ── */
    #screen-setup {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 100%; padding: 32px; gap: 16px;
    }
    #screen-setup h1 { font-size: 2rem; letter-spacing: .06em; color: #88aaff; }
    #screen-setup p  { color: #8888aa; font-size: .9rem; text-align: center; max-width: 280px; }
    #name-input {
      width: 100%; max-width: 280px; padding: 14px 16px;
      background: #1a1a2e; border: 1px solid #333366; border-radius: 10px;
      color: #fff; font-size: 1rem; outline: none; text-align: center;
    }
    #name-input::placeholder { color: #555588; }
    #start-btn {
      width: 100%; max-width: 280px; padding: 14px;
      background: #3355ff; border: none; border-radius: 10px;
      color: #fff; font-size: 1rem; font-weight: 600; cursor: pointer;
    }
    #start-btn:active { background: #2244ee; }

    /* ── Monitor screen ── */
    #screen-monitor {
      display: none; flex-direction: column; align-items: center;
      justify-content: center; height: 100%; padding: 24px; gap: 20px;
    }

    /* Running state — minimal */
    #running-view {
      display: flex; flex-direction: column; align-items: center; gap: 14px;
      text-align: center;
    }
    .pulse-dot {
      width: 16px; height: 16px; border-radius: 50%; background: #44ff88;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: .4; transform: scale(.85); }
    }
    #running-view p  { color: #555588; font-size: .85rem; }
    #running-name    { color: #88aaff; font-size: 1rem; font-weight: 600; }
    #change-name {
      background: none; border: none; color: #333355;
      font-size: .75rem; cursor: pointer;
    }

    /* No-face state — show camera so user can reposition */
    #noface-view {
      display: none; flex-direction: column; align-items: center; gap: 12px;
      width: 100%; text-align: center;
    }
    #noface-view p { color: #ff8866; font-size: .85rem; }
    #preview-wrap  {
      position: relative; width: 100%; border-radius: 12px;
      overflow: hidden; background: #111122;
    }
    #video {
      width: 100%; display: block;
      transform: scaleX(-1); object-fit: cover; max-height: 55vh;
    }

    #debug { font-size: .65rem; color: #222240; text-align: center; position: absolute; bottom: 10px; left: 0; right: 0; }

    /* Loading overlay */
    #loading {
      display: none; position: fixed; inset: 0; background: #0d0d1a; z-index: 10;
      flex-direction: column; align-items: center; justify-content: center; gap: 14px;
    }
    #loading p { color: #88aaff; font-size: .9rem; text-align: center; padding: 0 24px; }
    .spinner {
      width: 38px; height: 38px; border: 3px solid #222244;
      border-top-color: #3355ff; border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- Loading -->
<div id="loading">
  <div class="spinner"></div>
  <p id="load-msg">Loading face detection model…<br><small style="color:#555588">First load takes ~15 seconds</small></p>
</div>

<!-- Setup -->
<div id="screen-setup">
  <h1>Blincore</h1>
  <p>Passive blink monitoring. Enter your name to begin.</p>
  <input id="name-input" type="text" placeholder="Your name" autocomplete="off" />
  <button id="start-btn">Start Monitoring</button>
</div>

<!-- Monitor -->
<div id="screen-monitor">

  <!-- Hidden processing video — always in DOM so MediaPipe keeps reading -->
  <video id="video" autoplay playsinline muted
    style="position:absolute;width:1px;height:1px;opacity:0;pointer-events:none;"></video>

  <!-- Face detected: minimal indicator -->
  <div id="running-view">
    <div class="pulse-dot"></div>
    <div id="running-name"></div>
    <p>Monitoring</p>
    <button id="change-name">change name</button>
  </div>

  <!-- No face: camera feed + message -->
  <div id="noface-view">
    <p>Out of frame — center your face in the camera</p>
    <div id="preview-wrap">
      <video id="video-display" autoplay playsinline muted></video>
    </div>
  </div>

  <div id="debug"></div>
</div>

<script type="module">
import { FaceLandmarker, FilesetResolver }
  from 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs';

// ── Config ─────────────────────────────────────────────────────────────────
const SHEETS_URL       = 'https://script.google.com/macros/s/AKfycbxqfOevL7dmZLzIyUMs3GvHsUPpQ4LUuuwo2i1ZMYThv9HVrhWfJSxIQulOb2nd2oWi/exec';
const L_EYE            = [33, 160, 158, 133, 153, 144];
const R_EYE            = [362, 385, 387, 263, 373, 380];
const BLINK_THRESH     = 0.21;
const BLINK_MIN_FRAMES = 1;    // 1 frame = works even at low fps under thermal load
const BLINK_MAX_MS     = 800;
const LOG_INTERVAL_MS  = 60_000;
const OPEN_BUF_MAX     = 300;
const DUR_BUF_MAX      = 20;
const PAUSE_FLOOR_RATIO = 1.30; // pause = time EAR stays within 30% above min

// ── DOM ────────────────────────────────────────────────────────────────────
const $setup        = document.getElementById('screen-setup');
const $monitor      = document.getElementById('screen-monitor');
const $loading      = document.getElementById('loading');
const $loadMsg      = document.getElementById('load-msg');
const $nameInput    = document.getElementById('name-input');
const $startBtn     = document.getElementById('start-btn');
const $changeName   = document.getElementById('change-name');
const $debug        = document.getElementById('debug');
const $video        = document.getElementById('video');         // hidden — MediaPipe reads this
const $videoDisplay = document.getElementById('video-display'); // visible — shown to user
const $runningView  = document.getElementById('running-view');
const $nofaceView   = document.getElementById('noface-view');
const $runningName  = document.getElementById('running-name');

// ── App state ──────────────────────────────────────────────────────────────
let userName       = '';
let faceLandmarker = null;
let mediaStream    = null;
let wakeLock       = null;
let rafId          = null;

// Blink detection
let blinkThresh    = BLINK_THRESH;
let motionThresh   = BLINK_THRESH * 1.3;
let openEarBuf     = [];
let inBlink        = false;
let blinkStartT    = null;
let blinkFrames    = [];   // [[ts, ear], ...]
let blinkEvents    = [];   // last 60s
let closeDurBuf    = [];
let openDurBuf     = [];
let pauseDurBuf    = [];
let prevBlinkT     = null;
let totalBlinks    = 0;

// Post-blink open phase
let postBlinkMode    = false;
let pendingEv        = null;
let pendingMinT      = null;
let pendingAfterMin  = [];
let postBlinkFrames  = [];

let lastMetricT  = 0;
let lastLogT     = 0;
let lastBlinkT   = 0;  // last time a blink was detected
const NO_BLINK_RESET_MS = 30_000; // reset threshold if no blink for 30s while face tracked

// ── Restore saved name ─────────────────────────────────────────────────────
const saved = localStorage.getItem('blincore_name');
if (saved) $nameInput.value = saved;

// ── Event listeners ────────────────────────────────────────────────────────
$startBtn.addEventListener('click', () => {
  const name = $nameInput.value.trim();
  if (!name) { $nameInput.focus(); return; }
  userName = name;
  localStorage.setItem('blincore_name', name);
  startApp();
});

$nameInput.addEventListener('keydown', e => { if (e.key === 'Enter') $startBtn.click(); });

$changeName.addEventListener('click', () => {
  stopApp();
  $monitor.style.display = 'none';
  $setup.style.display   = 'flex';
});

// Re-acquire wake lock when tab becomes visible again
document.addEventListener('visibilitychange', async () => {
  if (document.visibilityState === 'visible' && !wakeLock && mediaStream) {
    await acquireWakeLock();
  }
});

// ── Wake lock ──────────────────────────────────────────────────────────────
async function acquireWakeLock() {
  try {
    wakeLock = await navigator.wakeLock.request('screen');
    wakeLock.addEventListener('release', () => { wakeLock = null; });
  } catch (_) { /* not supported on all browsers — screen may still time out */ }
}

// ── Geometry ───────────────────────────────────────────────────────────────
function dist(a, b) {
  return Math.sqrt((a.x - b.x) ** 2 + (a.y - b.y) ** 2);
}
function calcEAR(lm, idx) {
  const p = idx.map(i => lm[i]);
  return (dist(p[1], p[5]) + dist(p[2], p[4])) / (2 * dist(p[0], p[3]) + 1e-6);
}

// Linear interpolation threshold crossing (sub-frame timing)
function curveCrossing(times, ears, threshold) {
  for (let i = 0; i < ears.length - 1; i++) {
    if ((ears[i] - threshold) * (ears[i + 1] - threshold) <= 0) {
      const frac = (threshold - ears[i]) / (ears[i + 1] - ears[i]);
      return times[i] + frac * (times[i + 1] - times[i]);
    }
  }
  return null;
}

function mean(arr) { return arr.reduce((a, b) => a + b, 0) / arr.length; }

// ── Start / stop ───────────────────────────────────────────────────────────
async function startApp() {
  $setup.style.display   = 'none';
  $loading.style.display = 'flex';

  try {
    // Load MediaPipe (cached after first load)
    if (!faceLandmarker) {
      $loadMsg.innerHTML = 'Loading face detection model…<br><small style="color:#555588">First load takes ~15 seconds</small>';
      const vision = await FilesetResolver.forVisionTasks(
        'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm'
      );
      faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
        baseOptions: {
          modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task',
          delegate: 'GPU',
        },
        runningMode: 'VIDEO',
        numFaces: 1,
        outputFaceBlendshapes: false,
      });
    }

    // Camera
    $loadMsg.innerHTML = 'Starting camera…';
    mediaStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } },
      audio: false,
    });
    $video.srcObject        = mediaStream;
    $videoDisplay.srcObject = mediaStream;
    await new Promise(r => { $video.onloadedmetadata = r; });

    await acquireWakeLock();

    $loading.style.display  = 'none';
    $monitor.style.display  = 'flex';
    $runningName.textContent = userName;
    showFaceState(false);  // start with noface until first detection

    resetDetectionState();
    rafId = requestAnimationFrame(processFrame);

  } catch (err) {
    $loadMsg.innerHTML = `<span style="color:#ff6666">Error: ${err.message}</span><br><small>Make sure you allow camera access</small>`;
  }
}

function stopApp() {
  if (rafId)        { cancelAnimationFrame(rafId); rafId = null; }
  if (mediaStream)  { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
  if (wakeLock)     { wakeLock.release(); wakeLock = null; }
  $video.srcObject        = null;
  $videoDisplay.srcObject = null;
  resetDetectionState();
}

function resetDetectionState() {
  blinkThresh = BLINK_THRESH; motionThresh = BLINK_THRESH * 1.3;
  openEarBuf = []; inBlink = false; blinkStartT = null; blinkFrames = [];
  blinkEvents = []; closeDurBuf = []; openDurBuf = []; pauseDurBuf = []; prevBlinkT = null;
  postBlinkMode = false; pendingEv = null; pendingMinT = null;
  pendingAfterMin = []; postBlinkFrames = [];
  lastMetricT = 0; lastLogT = 0; totalBlinks = 0;
}

// ── Detection loop ─────────────────────────────────────────────────────────
function processFrame() {
  rafId = requestAnimationFrame(processFrame);
  if (!$video.videoWidth || $video.readyState < 2) return;

  const now    = performance.now();
  const result = faceLandmarker.detectForVideo($video, now);

  // ── No face ──────────────────────────────────────────────────────────────
  if (!result.faceLandmarks || result.faceLandmarks.length === 0) {
    showFaceState(false);
    if (inBlink && blinkStartT && (now - blinkStartT) > BLINK_MAX_MS) {
      inBlink = false; blinkFrames = []; blinkStartT = null;
    }
    return;
  }

  showFaceState(true);
  const lm     = result.faceLandmarks[0];
  const earAvg = (calcEAR(lm, L_EYE) + calcEAR(lm, R_EYE)) / 2;

  // ── Adaptive threshold ────────────────────────────────────────────────────
  if (!inBlink && !postBlinkMode) {
    openEarBuf.push(earAvg);
    if (openEarBuf.length > OPEN_BUF_MAX) openEarBuf.shift();
    if (openEarBuf.length >= 50) {
      // Use 80th percentile instead of mean — more robust on mobile where
      // camera angle produces naturally lower EAR samples that drag the mean down
      const sorted = [...openEarBuf].sort((a, b) => a - b);
      const m      = sorted[Math.floor(0.80 * sorted.length)];
      blinkThresh  = Math.max(0.65 * m, 0.18);   // floor raised from 0.15 → 0.18
      motionThresh = Math.max(0.85 * m, 0.22);
    }
  }

  // ── Blink FSM ─────────────────────────────────────────────────────────────
  if (earAvg < blinkThresh) {
    if (!inBlink) {
      inBlink = true; blinkStartT = now; blinkFrames = [[now, earAvg]];
    } else {
      blinkFrames.push([now, earAvg]);
    }
  } else {
    if (inBlink) {
      const durMs   = now - blinkStartT;
      const nFrames = blinkFrames.length;
      if (nFrames >= BLINK_MIN_FRAMES && durMs < BLINK_MAX_MS) {
        try { processBlink(durMs, now); } catch (e) { console.warn('[blink]', e); }
      }
      inBlink = false; blinkFrames = []; blinkStartT = null;
    }
  }

  // ── Post-blink open phase ─────────────────────────────────────────────────
  if (postBlinkMode) {
    postBlinkFrames.push([now, earAvg]);
    const combined  = [...pendingAfterMin, ...postBlinkFrames];
    const crossed   = curveCrossing(combined.map(f => f[0]), combined.map(f => f[1]), motionThresh);
    const timedOut  = (now - pendingMinT) > 1000;
    if (crossed !== null || timedOut) {
      if (crossed !== null) {
        const od = crossed - pendingMinT;
        pendingEv.openDurMs = od >= 10 ? od : null;
        if (pendingEv.openDurMs) pushBuf(openDurBuf, pendingEv.openDurMs);
        // Pause end: when opening EAR crosses floor threshold going up
        if (pendingEv.pauseStartT !== null && pendingEv.floorThresh != null) {
          const openSeg  = [...pendingAfterMin, ...postBlinkFrames];
          const pauseEnd = curveCrossing(openSeg.map(f => f[0]), openSeg.map(f => f[1]), pendingEv.floorThresh);
          if (pauseEnd && pauseEnd > pendingEv.pauseStartT) {
            const pd = pauseEnd - pendingEv.pauseStartT;
            pendingEv.pauseDurMs = pd >= 0 ? pd : null;
            if (pendingEv.pauseDurMs) pushBuf(pauseDurBuf, pendingEv.pauseDurMs);
          }
        }
      }
      if (pendingEv.closeDurMs) pushBuf(closeDurBuf, pendingEv.closeDurMs);
      postBlinkMode = false; pendingEv = null; pendingMinT = null;
      pendingAfterMin = []; postBlinkFrames = [];
    }
  }

  // ── Threshold reset if no blinks detected for 30s ────────────────────────
  if (lastBlinkT > 0 && (now - lastBlinkT) > NO_BLINK_RESET_MS) {
    blinkThresh  = BLINK_THRESH;
    motionThresh = BLINK_THRESH * 1.3;
    openEarBuf   = [];
    lastBlinkT   = now; // reset timer so it doesn't fire every frame
  }

  // ── Metrics (every 2s) ────────────────────────────────────────────────────
  if (now - lastMetricT >= 2000) {
    lastMetricT = now;
    updateMetrics(now);
  }

  // ── Debug line ────────────────────────────────────────────────────────────
  $debug.textContent = `EAR ${earAvg.toFixed(3)} | thr ${blinkThresh.toFixed(3)} | blinks ${totalBlinks}`;
}

// ── Blink processor ────────────────────────────────────────────────────────
function processBlink(durMs, now) {
  const times  = blinkFrames.map(f => f[0]);
  const ears   = blinkFrames.map(f => f[1]);
  const minEar = Math.min(...ears);
  const minIdx = ears.indexOf(minEar);
  const minT   = times[minIdx];

  const baseline = openEarBuf.length >= 10 ? mean(openEarBuf) : null;

  let closeDurMs = null, afterMinSeg = [];
  const floorThresh  = minEar * PAUSE_FLOOR_RATIO;
  let   pauseStartT  = null;

  if (!baseline || minEar <= 0.75 * baseline) {
    const closeSeg = blinkFrames.slice(0, minIdx + 2);
    if (closeSeg.length >= 2) {
      const segT = closeSeg.map(f => f[0]);
      const segE = closeSeg.map(f => f[1]);
      const cst  = curveCrossing(segT, segE, motionThresh) ?? blinkStartT;
      const cd   = minT - cst;
      closeDurMs = cd >= 10 ? cd : null;
      // Pause start: when closing EAR crosses floor threshold going down
      pauseStartT = curveCrossing(segT, segE, floorThresh) ?? minT;
    }
    afterMinSeg = blinkFrames.slice(minIdx);
  }

  const ibiMs = prevBlinkT !== null ? blinkStartT - prevBlinkT : null;
  const ev = { ts: blinkStartT, durMs, minEar, closeDurMs, openDurMs: null,
               pauseDurMs: null, pauseStartT, floorThresh, ibiMs };
  blinkEvents.push(ev);
  totalBlinks++;
  prevBlinkT = blinkStartT;
  lastBlinkT = now;

  if (closeDurMs !== null) {
    // Defer open phase to post-blink tracking
    postBlinkMode   = true;
    pendingEv       = ev;
    pendingMinT     = minT;
    pendingAfterMin = afterMinSeg;
    postBlinkFrames = [];
  }
}

function pushBuf(buf, val) {
  buf.push(val);
  if (buf.length > DUR_BUF_MAX) buf.shift();
}

// ── Metrics update ─────────────────────────────────────────────────────────
function updateMetrics(now) {
  const w60 = now - 60_000;
  blinkEvents = blinkEvents.filter(e => e.ts > w60);
  const rate = blinkEvents.length;

  const avgComp   = blinkEvents.length ? mean(blinkEvents.map(e => e.minEar))  : null;
  const rollClose = closeDurBuf.length  ? mean(closeDurBuf)                     : null;
  const rollOpen  = openDurBuf.length   ? mean(openDurBuf)                      : null;
  const rollPause = pauseDurBuf.length  ? mean(pauseDurBuf)                     : null;

  // (stats collected but not displayed — kept for Sheets upload)

  // Sheets every 60s
  if (now - lastLogT >= LOG_INTERVAL_MS) {
    lastLogT = now;
    const ibis = blinkEvents.filter(e => e.ibiMs != null).map(e => e.ibiMs);
    let ibiCv  = null;
    if (ibis.length >= 3) {
      const m  = mean(ibis);
      const sd = Math.sqrt(mean(ibis.map(v => (v - m) ** 2)));
      ibiCv    = m > 0 ? sd / m : null;
    }
    postToSheets({
      ts:                Date.now() / 1000,
      blink_rate:        rate,
      avg_close_dur_ms:  rollClose,
      avg_open_dur_ms:   rollOpen,
      avg_pause_dur_ms:  rollPause,
      avg_completeness:  avgComp,
      avg_smoothness:    null,
      ibi_cv:            ibiCv,
      sacc_rate:         0,
    });
  }
}

// Toggle between the two states
function showFaceState(faceDetected) {
  $runningView.style.display = faceDetected ? 'flex' : 'none';
  $nofaceView.style.display  = faceDetected ? 'none' : 'flex';
}

// ── Sheets POST ────────────────────────────────────────────────────────────
function postToSheets(data) {
  data.user = userName;
  fetch(SHEETS_URL, {
    method: 'POST',
    mode:   'no-cors',   // avoids CORS preflight; response is opaque but POST goes through
    body:   JSON.stringify(data),
  }).catch(() => {});
}
</script>
</body>
</html>
